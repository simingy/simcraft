name: simhammer-dev

services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=simhammer
      - POSTGRES_PASSWORD=simhammer
      - POSTGRES_DB=simhammer
    volumes:
      - simhammer-pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: backend
      dockerfile: server/Dockerfile
      args:
        - SIMC_VERSION=${SIMC_VERSION:-HEAD}
        - CARGO_FEATURES=postgres
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/resources/data
      - DATABASE_URL=postgres://simhammer:simhammer@postgres/simhammer
      - PORT=8000
    depends_on:
      - postgres

  frontend:
    build:
      context: frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  simhammer-pgdata:
